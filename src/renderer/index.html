<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Clueless</title>
    <style>
      :root {
        --panel-bg: linear-gradient(135deg, rgba(20, 20, 20, 0.78), rgba(40, 40, 40, 0.72));
        --panel-border: rgba(255, 255, 255, 0.2);
        --text: rgba(255, 255, 255, 0.92);
        --accent: #f39c12;
        --accent-strong: #ffb84a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
        color: var(--text);
        font-family: "Trebuchet MS", "Lucida Grande", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      .panel {
        width: 320px;
        padding: 16px 18px;
        border-radius: 14px;
        border: 1px solid var(--panel-border);
        background: var(--panel-bg);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        -webkit-app-region: drag;
        animation: float-in 420ms ease-out both;
      }

      .title {
        font-size: 15px;
        letter-spacing: 0.4px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
        margin-top: 6px;
      }

      .status {
        color: var(--accent);
        font-weight: 700;
      }

      body[data-enabled="on"] .status {
        color: var(--accent-strong);
      }

      .hint {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.35;
        opacity: 0.8;
      }

      button {
        margin-top: 10px;
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        transition: transform 150ms ease, background 150ms ease;
        -webkit-app-region: no-drag;
      }

      button:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.14);
      }

      @keyframes float-in {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body data-enabled="off">
    <div class="panel">
      <div class="title">Clueless Shield</div>
      <div class="row">
        <span>Protection</span>
        <span class="status" id="protection-status">OFF</span>
      </div>
      <div class="row">
        <span>Share Guard</span>
        <span class="status" id="guard-status">IDLE</span>
      </div>
      <div class="row">
        <span>Auto-Hide</span>
        <span class="status" id="auto-hide-status">OFF</span>
      </div>
      <div class="row">
        <span>Visibility</span>
        <span class="status" id="visibility-status">VISIBLE</span>
      </div>
      <button id="toggle-protection">Enable Protection</button>
      <button id="toggle-auto-hide">Enable Auto-Hide</button>
      <div class="hint">
        Hotkeys: Ctrl+Shift+H hide/show • Ctrl+Shift+P protection • Ctrl+Shift+A auto-hide
      </div>
    </div>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
